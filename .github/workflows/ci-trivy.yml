name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  IMAGE_NAME: demo-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test - Node ${{matrix.node}} / ${{matrix.os}}
    needs: lint
    runs-on: ${{matrix.os}}

    strategy: 
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
        os: [ubuntu-22.04, ubuntu-24.04] 
        exclude:
          - node: '18'
            os: ubuntu-24.04
    

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Display environment info
        run: |
          echo "Running tests on Node.js version: $(node -v)"
          echo "Running tests on npm version: $(npm -v)"
          echo "Running tests on OS: ${{ matrix.os }}"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test


  docker:
    name: Call reusable Docker build
    needs: test

    permissions:
      contents: read
      packages: write

    uses: ./.github/workflows/reusable-build.yml

    with:
      image_name: ghcr.io/${{ github.repository_owner }}/demo-app
      image_tag: sha-${{ github.sha }}

    secrets: inherit
